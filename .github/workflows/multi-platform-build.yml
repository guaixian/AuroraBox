name: Multi-Platform Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag override (leave blank for auto)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'
    branches: [main, feature/*]
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'package.json'
      - 'deno.json'
      - 'deno.lock'

jobs:
  # ── Linux (amd64 + arm64) ──────────────────────────────────────
  linux:
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: '2.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev patchelf rpm

      - name: Build frontend
        run: deno task build

      - name: Build Tauri (deb + rpm)
        run: deno task tauri build --bundles deb,rpm --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aurorabox-linux-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

  # ── macOS (amd64 + arm64) ──────────────────────────────────────
  macos:
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: '2.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build frontend
        run: deno task build

      - name: Build Tauri (dmg)
        run: deno task tauri build --bundles dmg --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aurorabox-macos-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  # ── Windows (amd64) ────────────────────────────────────────────
  windows:
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: '2.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build frontend
        run: deno task build

      - name: Build Tauri (msi + nsis)
        run: deno task tauri build --bundles msi,nsis --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aurorabox-windows-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  # ── Release (tag push only) ────────────────────────────────────
  release:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Summary ────────────────────────────────────────────────────
  summary:
    needs: [linux, macos, windows]
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architectures |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | amd64, arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS    | amd64, arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | amd64        |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the Actions run page." >> $GITHUB_STEP_SUMMARY
